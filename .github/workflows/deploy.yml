name: Deploy to Production

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev]
    types: [closed]

jobs:
  deploy:
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Validate required secrets
        run: |
          missing=()
          [ -z "${{ secrets.SSH_HOST }}"            ] && missing+=("SSH_HOST")
          [ -z "${{ secrets.SSH_USER }}"            ] && missing+=("SSH_USER")
          [ -z "${{ secrets.SSH_PASSWORD }}"        ] && missing+=("SSH_PASSWORD")
          [ -z "${{ secrets.POSTGRES_PASSWORD }}"   ] && missing+=("POSTGRES_PASSWORD")
          [ -z "${{ secrets.SECRET_KEY }}"          ] && missing+=("SECRET_KEY")
          [ -z "${{ secrets.BASE_URL }}"            ] && missing+=("BASE_URL")
          [ -z "${{ secrets.ANTHROPIC_API_KEY }}"   ] && missing+=("ANTHROPIC_API_KEY")
          [ -z "${{ secrets.TWILIO_ACCOUNT_SID }}"  ] && missing+=("TWILIO_ACCOUNT_SID")
          [ -z "${{ secrets.TWILIO_AUTH_TOKEN }}"   ] && missing+=("TWILIO_AUTH_TOKEN")
          [ -z "${{ secrets.TWILIO_PHONE_NUMBER }}" ] && missing+=("TWILIO_PHONE_NUMBER")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "ERROR: Missing required secrets: ${missing[*]}"
            exit 1
          fi
          echo "All required secrets present."

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script_stop: true
          command_timeout: 20m
          script: |
            set -e
            BRANCH="${{ github.head_ref || github.ref_name }}"
            APP_DIR=/opt/sears-voice-ai

            echo "==> Pulling branch: $BRANCH"
            cd "$APP_DIR"
            git fetch origin
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            echo "==> Writing .env"
            cat > "$APP_DIR/.env" << ENVEOF
POSTGRES_HOST=db
POSTGRES_PORT=5432
POSTGRES_DB=sears_voice
POSTGRES_USER=sears
POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
VOICE_LLM_PROVIDER=anthropic
VISION_LLM_PROVIDER=anthropic
ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}
TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
TWILIO_PHONE_NUMBER=${{ secrets.TWILIO_PHONE_NUMBER }}
BASE_URL=${{ secrets.BASE_URL }}
APP_ENV=production
SECRET_KEY=${{ secrets.SECRET_KEY }}
LOG_LEVEL=INFO
SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }}
FROM_EMAIL=alex@sears-voice.example.com
UPLOAD_LINK_TTL_HOURS=24
ENVEOF
            chmod 600 "$APP_DIR/.env"
            echo "==> Wrote $APP_DIR/.env"

            echo "==> Running deploy script..."
            bash "$APP_DIR/scripts/deploy.sh"

      - name: Post deployment summary
        if: success()
        run: |
          echo "### Deployment successful" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: \`${{ github.head_ref || github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Server: \`${{ secrets.SSH_HOST }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Health: \`${{ secrets.BASE_URL }}/health\`" >> $GITHUB_STEP_SUMMARY
