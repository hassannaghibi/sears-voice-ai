name: Deploy to Dev Server

on:
  push:
    branches:
      - dev

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
          BASE_URL: ${{ secrets.BASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          NGINX_SERVER_NAME: ${{ secrets.NGINX_SERVER_NAME }}
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
          APP_ENV: production
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          envs: POSTGRES_PASSWORD,OPENAI_API_KEY,TWILIO_ACCOUNT_SID,TWILIO_AUTH_TOKEN,TWILIO_PHONE_NUMBER,BASE_URL,SECRET_KEY,SENDGRID_API_KEY,FROM_EMAIL,NGINX_SERVER_NAME,CERTBOT_EMAIL,APP_ENV
          script_stop: true
          command_timeout: 15m
          script: |
            bash -s <<'DEPLOY_SCRIPT'
            set -euo pipefail
            APP_DIR=/opt/sears-voice-ai
            REPO=https://github.com/hassannaghibi/sears-voice-ai.git

            mkdir -p "$APP_DIR"
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone -b dev "$REPO" "$APP_DIR"
            fi
            cd "$APP_DIR"
            git fetch origin dev
            git checkout dev
            git reset --hard origin/dev

            chmod +x scripts/deploy.sh scripts/setup-nginx-ssl.sh scripts/write-env.sh
            ./scripts/write-env.sh
            ./scripts/deploy.sh

            if ! command -v nginx >/dev/null 2>&1; then
              SERVER_NAME="${NGINX_SERVER_NAME:-165-245-212-11.sslip.io}" \
              CERTBOT_EMAIL="${CERTBOT_EMAIL:-admin@example.com}" \
              ./scripts/setup-nginx-ssl.sh
            else
              systemctl reload nginx || true
            fi
            DEPLOY_SCRIPT

      - name: Run tests on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script_stop: true
          command_timeout: 10m
          script: |
            bash -s <<'TEST_SCRIPT'
            set -euo pipefail
            cd /opt/sears-voice-ai
            docker compose exec -T api pytest tests/unit tests/integration -v --cov=app --cov-report=term-missing --cov-fail-under=80
            TEST_SCRIPT
