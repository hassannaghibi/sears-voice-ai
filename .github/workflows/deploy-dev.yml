name: Deploy to Dev Server

on:
  push:
    branches:
      - dev

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
          BASE_URL: ${{ secrets.BASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          APP_ENV: production
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          envs: POSTGRES_PASSWORD,OPENAI_API_KEY,TWILIO_ACCOUNT_SID,TWILIO_AUTH_TOKEN,TWILIO_PHONE_NUMBER,BASE_URL,SECRET_KEY,SENDGRID_API_KEY,FROM_EMAIL,APP_ENV
          script_stop: true
          command_timeout: 15m
          script: |
            set -euo pipefail
            APP_DIR=/opt/sears-voice-ai
            REPO=https://github.com/hassannaghibi/sears-voice-ai.git

            mkdir -p "$APP_DIR"
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone -b dev "$REPO" "$APP_DIR"
            fi
            cd "$APP_DIR"
            git fetch origin dev
            git checkout dev
            git reset --hard origin/dev

            cat > .env <<EOF
            POSTGRES_HOST=db
            POSTGRES_PORT=5432
            POSTGRES_DB=sears_voice
            POSTGRES_USER=sears
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            OPENAI_API_KEY=${OPENAI_API_KEY}
            TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
            TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
            TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
            BASE_URL=${BASE_URL}
            APP_ENV=${APP_ENV:-production}
            SECRET_KEY=${SECRET_KEY}
            LOG_LEVEL=INFO
            SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
            FROM_EMAIL=${FROM_EMAIL:-alex@sears-voice.example.com}
            UPLOAD_LINK_TTL_HOURS=24
            EOF

            chmod +x scripts/deploy.sh scripts/setup-nginx-ssl.sh
            ./scripts/deploy.sh

            # Ensure nginx + TLS on first deploy
            if ! command -v nginx >/dev/null 2>&1; then
              SERVER_NAME="${{ secrets.NGINX_SERVER_NAME }}" \
              CERTBOT_EMAIL="${{ secrets.CERTBOT_EMAIL }}" \
              ./scripts/setup-nginx-ssl.sh
            else
              systemctl reload nginx || true
            fi

      - name: Run tests on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script_stop: true
          command_timeout: 10m
          script: |
            cd /opt/sears-voice-ai
            docker compose exec -T api pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=80
